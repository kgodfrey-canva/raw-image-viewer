name: CI

on:
  push:
    branches: [ main, master, feature/* ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18, 20]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install webview dependencies
      run: npm ci --prefix webview
    
    - name: Install xvfb for headless testing
      run: |
        sudo rm -f /etc/apt/sources.list.d/microsoft-prod.list
        sudo rm -f /etc/apt/sources.list.d/azure-cli.list
        sudo apt-get update && sudo apt-get install -y xvfb
    
    - name: Type check
      run: npm run typecheck
    
    - name: Lint
      run: npm run lint
    
    - name: Build webview
      run: npm run build:webview
    
    - name: Compile extension
      run: npm run compile
    
    - name: Run tests
      run: xvfb-run -a npm run test
    
    - name: Package extension (dry run)
      run: npm run package
      continue-on-error: true

  build-check:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Install webview dependencies
      run: npm ci --prefix webview
    
    - name: Build extension
      run: npm run build
    
    - name: Install vsce
      run: npm install -g @vscode/vsce
    
    - name: Package extension
      run: vsce package
    
    - name: Check package size
      run: |
        if ls raw-image-viewer-*.vsix 1> /dev/null 2>&1; then
          echo "Extension package created successfully"
          ls -lh raw-image-viewer-*.vsix
        else
          echo "Extension package not found"
          exit 1
        fi
